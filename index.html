<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>القارئ القرآني — Base Chain</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #c9a84c;
      --gold2:  #e8d08a;
      --ink:    #0d0c07;
      --paper:  #f7f0e0;
      --teal:   #1a4a4a;
      --radius: 12px;
      --shadow: 0 8px 40px rgba(0,0,0,.35);
    }

    html, body {
      height: 100%;
      font-family: 'Amiri', serif;
      background: var(--ink);
      color: var(--paper);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, #2a1a00 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 90%, #0a2020 0%, transparent 60%),
        repeating-linear-gradient(45deg, transparent 0px, transparent 40px,
          rgba(201,168,76,.03) 40px, rgba(201,168,76,.03) 41px);
      pointer-events: none;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      gap: 32px;
    }

    header { text-align: center; }

    .bismillah {
      font-family: 'Amiri Quran', serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: var(--gold);
      line-height: 1.4;
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px rgba(201,168,76,.3); }
      to   { text-shadow: 0 0 50px rgba(201,168,76,.7), 0 0 80px rgba(201,168,76,.2); }
    }

    .subtitle {
      font-size: .85rem;
      color: rgba(247,240,224,.45);
      margin-top: 8px;
      font-family: 'DM Mono', monospace;
      direction: ltr;
    }

    .ornament { color: var(--gold); opacity: .5; font-size: 1.4rem; letter-spacing: .4em; }

    /* Wallet Card */
    .card {
      background: linear-gradient(145deg, rgba(247,240,224,.06), rgba(247,240,224,.02));
      border: 1px solid rgba(201,168,76,.25);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
      padding: 28px 32px;
      width: 100%; max-width: 560px;
      box-shadow: var(--shadow);
    }

    .wallet-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; direction: ltr; }

    .wallet-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #ff5555; flex-shrink: 0; transition: background .4s;
    }
    .wallet-dot.connected { background: #50fa7b; box-shadow: 0 0 8px #50fa7b; }

    #walletAddr { font-family: 'DM Mono', monospace; font-size: .8rem; color: var(--gold2); flex: 1; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(26,74,74,.6); border: 1px solid rgba(201,168,76,.3);
      border-radius: 99px; padding: 4px 12px;
      font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--gold2); direction: ltr;
    }

    .stats { display: flex; gap: 24px; direction: ltr; margin-top: 16px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-family: 'DM Mono', monospace; font-size: .65rem; color: rgba(247,240,224,.4); text-transform: uppercase; letter-spacing: .1em; }
    .stat-value { font-family: 'DM Mono', monospace; font-size: .95rem; color: var(--gold); }

    /* Buttons */
    .btn-connect, .btn-read {
      width: 100%; max-width: 560px; padding: 18px; border: none;
      border-radius: var(--radius); font-family: 'Amiri', serif; font-size: 1.2rem;
      cursor: pointer; transition: all .25s ease; position: relative; overflow: hidden;
    }

    .btn-connect { background: linear-gradient(135deg, var(--gold) 0%, #a07828 100%); color: var(--ink); font-weight: 700; }
    .btn-connect:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(201,168,76,.35); }

    .btn-read { background: linear-gradient(135deg, var(--teal) 0%, #0d2e2e 100%); color: var(--gold2); border: 1px solid rgba(201,168,76,.35); font-size: 1.3rem; letter-spacing: .04em; }
    .btn-read:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(26,74,74,.6); border-color: var(--gold); }
    .btn-read:disabled { opacity: .5; cursor: not-allowed; }

    /* Verse Frame */
    .verse-frame {
      width: 100%; max-width: 700px;
      background: linear-gradient(160deg, rgba(247,240,224,.07), rgba(247,240,224,.02));
      border: 1px solid rgba(201,168,76,.3);
      border-radius: var(--radius);
      padding: 40px 36px;
      text-align: center;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(201,168,76,.1);
    }

    .verse-item {
      margin-bottom: 36px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(201,168,76,.15);
      opacity: 0;
      animation: fadeUp .5s ease forwards;
    }
    .verse-item:nth-child(1) { animation-delay: .1s; }
    .verse-item:nth-child(2) { animation-delay: .3s; }
    .verse-item:nth-child(3) { animation-delay: .5s; }
    .verse-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .verse-number {
      font-family: 'DM Mono', monospace; font-size: .6rem;
      color: var(--gold); opacity: .5; letter-spacing: .2em;
      text-transform: uppercase; direction: ltr; margin-bottom: 12px;
    }

    .verse-arabic {
      font-family: 'Amiri Quran', serif;
      font-size: clamp(1.5rem, 3.5vw, 2.1rem);
      line-height: 2.2; color: var(--paper);
      text-shadow: 0 2px 12px rgba(0,0,0,.4); margin-bottom: 12px;
    }

    .verse-ref {
      font-family: 'DM Mono', monospace; font-size: .7rem;
      color: var(--gold); opacity: .75; direction: ltr; letter-spacing: .08em;
    }

    .verse-english {
      font-family: 'Amiri', serif;
      font-size: clamp(.9rem, 2vw, 1.1rem);
      line-height: 1.8;
      color: rgba(247,240,224,.55);
      direction: ltr;
      text-align: left;
      margin-bottom: 12px;
      font-style: italic;
      border-left: 2px solid rgba(201,168,76,.3);
      padding-left: 12px;
    }

    .audio-bar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(201,168,76,.2);
      direction: ltr;
      flex-wrap: wrap;
    }

    .btn-audio {
      background: linear-gradient(135deg, rgba(201,168,76,.2), rgba(201,168,76,.05));
      border: 1px solid rgba(201,168,76,.4);
      border-radius: 99px;
      color: var(--gold2);
      font-family: 'Amiri', serif;
      font-size: 1rem;
      padding: 10px 22px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-audio:hover { background: rgba(201,168,76,.25); transform: translateY(-1px); }

    .audio-status {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: rgba(247,240,224,.4);
    }

    /* Loader */
    .loader {
      display: none; width: 36px; height: 36px;
      border: 3px solid rgba(201,168,76,.2); border-top-color: var(--gold);
      border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #statusMsg {
      font-family: 'DM Mono', monospace; font-size: .75rem;
      color: rgba(247,240,224,.5); text-align: center; direction: ltr; min-height: 20px;
    }
    #statusMsg.error   { color: #ff6b6b; }
    #statusMsg.success { color: #50fa7b; }

    .tx-info {
      direction: ltr; font-family: 'DM Mono', monospace; font-size: .7rem;
      color: rgba(247,240,224,.35); text-align: center; display: none;
    }
    .tx-info a { color: var(--gold); text-decoration: none; }
    .tx-info a:hover { text-decoration: underline; }

    footer { direction: ltr; font-family: 'DM Mono', monospace; font-size: .65rem; color: rgba(247,240,224,.2); text-align: center; }
    footer a { color: rgba(201,168,76,.5); text-decoration: none; }
    footer a:hover { color: var(--gold); }
  </style>
</head>
<body>

<div class="page">

  <header>
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    <div class="subtitle">Quran Reader · Base Blockchain · On-Chain Every Verse</div>
  </header>

  <div class="ornament">❖ ✦ ❖</div>

  <div class="card">
    <div class="wallet-row">
      <div class="wallet-dot" id="walletDot"></div>
      <span id="walletAddr">غير متصل — Not Connected</span>
      <div class="badge" id="networkBadge" style="display:none">
        <span>⬡</span><span id="networkName">Base</span>
      </div>
    </div>
    <div class="stats" id="statsRow" style="display:none">
      <div class="stat"><span class="stat-label">Your Reads</span><span class="stat-value" id="myReads">0</span></div>
      <div class="stat"><span class="stat-label">Global Reads</span><span class="stat-value" id="globalReads">0</span></div>
      <div class="stat"><span class="stat-label">Fee</span><span class="stat-value" id="readFee">0 ETH</span></div>
    </div>
  </div>

  <button class="btn-connect" id="btnConnect" onclick="connectWallet()">🔗 &nbsp; Connect Wallet</button>
  <button class="btn-read" id="btnRead" onclick="requestVerse()" disabled>اقرأ ثلاث آيات &nbsp;—&nbsp; Read 3 Verses</button>

  <div class="loader" id="loader"></div>
  <div id="statusMsg"></div>

  <!-- Verses shown immediately on page load -->
  <div class="verse-frame" id="verseFrame"></div>

  <div class="tx-info" id="txInfo">
    tx: <a id="txLink" href="#" target="_blank"></a>
  </div>

  <div class="ornament" style="opacity:.25">❖ ✦ ❖</div>

  <footer>
    Built on Base &nbsp;|&nbsp; <a href="https://basescan.org" target="_blank">BaseScan ↗</a>
  </footer>

</div>

<script>
const CONTRACT_ADDRESS = "0x7676442bc0DB42618812F28d31194Fd88bAdc70A";

const ABI = [
  "function requestVerse() external payable returns (uint256 verseIndex)",
  "function getStats(address wallet) external view returns (uint256, uint256, uint256)",
  "function readFee() external view returns (uint256)",
  "event VerseRequested(address indexed reader, uint256 verseIndex, uint256 globalCount, uint256 timestamp)"
];

const BASE_CHAIN_ID  = 8453;
const BASE_CHAIN_HEX = "0x2105";
const BASESCAN_URL   = "https://basescan.org/tx/";

// ── 10 sets of 3 consecutive verses ──────────────────────────────────────
// 50 sets of 3 complete consecutive verses — Juz 1–29 — with English & audio
// Audio: each verse has a verseKey like "2:255" used to fetch mp3 from everyayah.com
const VERSE_SETS = [
  [
    { arabic: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", english: "All praise is for Allah, Lord of all worlds.", ref: "Al-Fatiha 1:2", key: "1:2" },
    { arabic: "الرَّحْمَٰنِ الرَّحِيمِ", english: "The Most Gracious, Most Merciful.", ref: "Al-Fatiha 1:3", key: "1:3" },
    { arabic: "مَالِكِ يَوْمِ الدِّينِ", english: "Master of the Day of Judgment.", ref: "Al-Fatiha 1:4", key: "1:4" }
  ],
  [
    { arabic: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", english: "You alone we worship, and You alone we ask for help.", ref: "Al-Fatiha 1:5", key: "1:5" },
    { arabic: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", english: "Guide us along the straight path.", ref: "Al-Fatiha 1:6", key: "1:6" },
    { arabic: "صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ", english: "The path of those You have blessed, not those You are angry with or who are astray.", ref: "Al-Fatiha 1:7", key: "1:7" }
  ],
  [
    { arabic: "ذَٰلِكَ الْكِتَابُ لَا رَيْبَ فِيهِ هُدًى لِّلْمُتَّقِينَ", english: "This is the Book about which there is no doubt, a guidance for those conscious of Allah.", ref: "Al-Baqarah 2:2", key: "2:2" },
    { arabic: "الَّذِينَ يُؤْمِنُونَ بِالْغَيْبِ وَيُقِيمُونَ الصَّلَاةَ وَمِمَّا رَزَقْنَاهُمْ يُنفِقُونَ", english: "Who believe in the unseen, establish prayer, and donate from what We have provided for them.", ref: "Al-Baqarah 2:3", key: "2:3" },
    { arabic: "وَالَّذِينَ يُؤْمِنُونَ بِمَا أُنزِلَ إِلَيْكَ وَمَا أُنزِلَ مِن قَبْلِكَ وَبِالْآخِرَةِ هُمْ يُوقِنُونَ", english: "And who believe in what has been revealed to you and what was revealed before you, and firmly believe in the Hereafter.", ref: "Al-Baqarah 2:4", key: "2:4" }
  ],
  [
    { arabic: "يَا أَيُّهَا الَّذِينَ آمَنُوا اسْتَعِينُوا بِالصَّبْرِ وَالصَّلَاةِ ۚ إِنَّ اللَّهَ مَعَ الصَّابِرِينَ", english: "O believers! Seek help through patience and prayer. Surely Allah is with those who are patient.", ref: "Al-Baqarah 2:153", key: "2:153" },
    { arabic: "وَلَا تَقُولُوا لِمَن يُقْتَلُ فِي سَبِيلِ اللَّهِ أَمْوَاتٌ ۚ بَلْ أَحْيَاءٌ وَلَٰكِن لَّا تَشْعُرُونَ", english: "Do not say those killed in Allah's cause are dead — they are alive, but you do not perceive it.", ref: "Al-Baqarah 2:154", key: "2:154" },
    { arabic: "وَلَنَبْلُوَنَّكُم بِشَيْءٍ مِّنَ الْخَوْفِ وَالْجُوعِ وَنَقْصٍ مِّنَ الْأَمْوَالِ وَالْأَنفُسِ وَالثَّمَرَاتِ ۗ وَبَشِّرِ الصَّابِرِينَ", english: "We will test you with fear, hunger, and loss of wealth, lives, and crops. Give good news to the patient.", ref: "Al-Baqarah 2:155", key: "2:155" }
  ],
  [
    { arabic: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ", english: "Allah — there is no god except Him, the Ever-Living, the Sustainer. Neither drowsiness nor sleep overtakes Him.", ref: "Al-Baqarah 2:255", key: "2:255" },
    { arabic: "لَا إِكْرَاهَ فِي الدِّينِ ۖ قَد تَّبَيَّنَ الرُّشْدُ مِنَ الْغَيِّ", english: "There is no compulsion in religion. The right way has become distinct from the wrong.", ref: "Al-Baqarah 2:256", key: "2:256" },
    { arabic: "اللَّهُ وَلِيُّ الَّذِينَ آمَنُوا يُخْرِجُهُم مِّنَ الظُّلُمَاتِ إِلَى النُّورِ", english: "Allah is the Guardian of the believers — He brings them out of darkness into light.", ref: "Al-Baqarah 2:257", key: "2:257" }
  ],
  [
    { arabic: "لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا", english: "Allah does not burden any soul beyond what it can bear.", ref: "Al-Baqarah 2:286", key: "2:286" },
    { arabic: "رَبَّنَا لَا تُؤَاخِذْنَا إِن نَّسِينَا أَوْ أَخْطَأْنَا", english: "Our Lord! Do not punish us if we forget or make a mistake.", ref: "Al-Baqarah 2:286", key: "2:286" },
    { arabic: "رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ ۖ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا ۚ أَنتَ مَوْلَانَا", english: "Our Lord! Do not burden us with what we cannot bear. Pardon us, forgive us, and have mercy on us. You are our Guardian.", ref: "Al-Baqarah 2:286", key: "2:286" }
  ],
  [
    { arabic: "رَبَّنَا لَا تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا وَهَبْ لَنَا مِن لَّدُنكَ رَحْمَةً", english: "Our Lord! Do not let our hearts deviate after You have guided us. Grant us Your mercy.", ref: "Ali Imran 3:8", key: "3:8" },
    { arabic: "رَبَّنَا إِنَّكَ جَامِعُ النَّاسِ لِيَوْمٍ لَّا رَيْبَ فِيهِ ۚ إِنَّ اللَّهَ لَا يُخْلِفُ الْمِيعَادَ", english: "Our Lord! You will gather all people on the Day about which there is no doubt. Surely Allah never breaks His promise.", ref: "Ali Imran 3:9", key: "3:9" },
    { arabic: "كُلُّ نَفْسٍ ذَائِقَةُ الْمَوْتِ ۗ وَإِنَّمَا تُوَفَّوْنَ أُجُورَكُمْ يَوْمَ الْقِيَامَةِ", english: "Every soul will taste death, and you will receive your full reward on the Day of Judgment.", ref: "Ali Imran 3:185", key: "3:185" }
  ],
  [
    { arabic: "وَاعْبُدُوا اللَّهَ وَلَا تُشْرِكُوا بِهِ شَيْئًا ۖ وَبِالْوَالِدَيْنِ إِحْسَانًا", english: "Worship Allah and associate nothing with Him, and be good to parents.", ref: "An-Nisa 4:36", key: "4:36" },
    { arabic: "إِنَّ اللَّهَ لَا يَظْلِمُ مِثْقَالَ ذَرَّةٍ ۖ وَإِن تَكُ حَسَنَةً يُضَاعِفْهَا", english: "Indeed Allah does not wrong anyone even by an atom's weight. If there is a good deed He multiplies it.", ref: "An-Nisa 4:40", key: "4:40" },
    { arabic: "يَا أَيُّهَا الَّذِينَ آمَنُوا أَوْفُوا بِالْعُقُودِ", english: "O believers! Fulfil your obligations.", ref: "Al-Ma'idah 5:1", key: "5:1" }
  ],
  [
    { arabic: "وَتَعَاوَنُوا عَلَى الْبِرِّ وَالتَّقْوَىٰ ۖ وَلَا تَعَاوَنُوا عَلَى الْإِثْمِ وَالْعُدْوَانِ", english: "Cooperate in goodness and righteousness, and do not cooperate in sin and transgression.", ref: "Al-Ma'idah 5:2", key: "5:2" },
    { arabic: "الْيَوْمَ أَكْمَلْتُ لَكُمْ دِينَكُمْ وَأَتْمَمْتُ عَلَيْكُمْ نِعْمَتِي وَرَضِيتُ لَكُمُ الْإِسْلَامَ دِينًا", english: "Today I have perfected your faith, completed My favour upon you, and chosen Islam as your way.", ref: "Al-Ma'idah 5:3", key: "5:3" },
    { arabic: "وَهُوَ اللَّهُ فِي السَّمَاوَاتِ وَفِي الْأَرْضِ ۖ يَعْلَمُ سِرَّكُمْ وَجَهْرَكُمْ", english: "He is Allah in the heavens and earth. He knows your secrets and what you reveal.", ref: "Al-An'am 6:3", key: "6:3" }
  ],
  [
    { arabic: "ادْعُوا رَبَّكُمْ تَضَرُّعًا وَخُفْيَةً ۚ إِنَّهُ لَا يُحِبُّ الْمُعْتَدِينَ", english: "Call upon your Lord humbly and privately. He does not like transgressors.", ref: "Al-A'raf 7:55", key: "7:55" },
    { arabic: "وَلَا تُفْسِدُوا فِي الْأَرْضِ بَعْدَ إِصْلَاحِهَا وَادْعُوهُ خَوْفًا وَطَمَعًا", english: "Do not spread corruption after it has been set in order. Call upon Him with hope and fear.", ref: "Al-A'raf 7:56", key: "7:56" },
    { arabic: "إِنَّ رَحْمَتَ اللَّهِ قَرِيبٌ مِّنَ الْمُحْسِنِينَ", english: "Indeed Allah's mercy is near to the good-doers.", ref: "Al-A'raf 7:56", key: "7:56" }
  ],
  [
    { arabic: "إِنَّمَا الْمُؤْمِنُونَ الَّذِينَ إِذَا ذُكِرَ اللَّهُ وَجِلَتْ قُلُوبُهُمْ", english: "The believers are only those whose hearts tremble when Allah is mentioned.", ref: "Al-Anfal 8:2", key: "8:2" },
    { arabic: "وَإِذَا تُلِيَتْ عَلَيْهِمْ آيَاتُهُ زَادَتْهُمْ إِيمَانًا وَعَلَىٰ رَبِّهِمْ يَتَوَكَّلُونَ", english: "And whose faith increases when His verses are recited, and who put their trust in their Lord.", ref: "Al-Anfal 8:2", key: "8:2" },
    { arabic: "أُولَٰئِكَ هُمُ الْمُؤْمِنُونَ حَقًّا ۚ لَّهُمْ دَرَجَاتٌ عِندَ رَبِّهِمْ وَمَغْفِرَةٌ وَرِزْقٌ كَرِيمٌ", english: "It is they who are truly believers. They will have elevated ranks, forgiveness, and an honourable provision.", ref: "Al-Anfal 8:4", key: "8:4" }
  ],
  [
    { arabic: "قُل لَّن يُصِيبَنَا إِلَّا مَا كَتَبَ اللَّهُ لَنَا هُوَ مَوْلَانَا ۚ وَعَلَى اللَّهِ فَلْيَتَوَكَّلِ الْمُؤْمِنُونَ", english: "Say: Nothing will ever befall us except what Allah has destined. He is our Guardian — in Allah let the believers put their trust.", ref: "At-Tawbah 9:51", key: "9:51" },
    { arabic: "وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ ۚ عَلَيْهِ تَوَكَّلْتُ وَإِلَيْهِ أُنِيبُ", english: "My success comes only through Allah. In Him I trust and to Him I turn.", ref: "Hud 11:88", key: "11:88" },
    { arabic: "وَاسْتَغْفِرُوا رَبَّكُمْ ثُمَّ تُوبُوا إِلَيْهِ ۚ إِنَّ رَبِّي رَحِيمٌ وَدُودٌ", english: "Seek your Lord's forgiveness and turn to Him. Surely my Lord is Most Merciful, Most Loving.", ref: "Hud 11:90", key: "11:90" }
  ],
  [
    { arabic: "فَاللَّهُ خَيْرٌ حَافِظًا ۖ وَهُوَ أَرْحَمُ الرَّاحِمِينَ", english: "Allah is the best guardian, and He is the Most Merciful of the merciful.", ref: "Yusuf 12:64", key: "12:64" },
    { arabic: "إِنَّمَا أَشْكُو بَثِّي وَحُزْنِي إِلَى اللَّهِ وَأَعْلَمُ مِنَ اللَّهِ مَا لَا تَعْلَمُونَ", english: "I only complain of my anguish and grief to Allah, and I know from Allah what you do not know.", ref: "Yusuf 12:86", key: "12:86" },
    { arabic: "يَا بَنِيَّ اذْهَبُوا فَتَحَسَّسُوا مِن يُوسُفَ وَأَخِيهِ وَلَا تَيْأَسُوا مِن رَّوْحِ اللَّهِ ۖ إِنَّهُ لَا يَيْأَسُ مِن رَّوْحِ اللَّهِ إِلَّا الْقَوْمُ الْكَافِرُونَ", english: "O my sons! Go search for Yusuf and his brother, and do not despair of Allah's mercy. No one despairs of Allah's mercy except the disbelieving people.", ref: "Yusuf 12:87", key: "12:87" }
  ],
  [
    { arabic: "وَإِذْ تَأَذَّنَ رَبُّكُمْ لَئِن شَكَرْتُمْ لَأَزِيدَنَّكُمْ ۖ وَلَئِن كَفَرْتُمْ إِنَّ عَذَابِي لَشَدِيدٌ", english: "Your Lord declared: If you are grateful, I will increase you. But if you are ungrateful, My punishment is severe.", ref: "Ibrahim 14:7", key: "14:7" },
    { arabic: "إِنَّا نَحْنُ نَزَّلْنَا الذِّكْرَ وَإِنَّا لَهُ لَحَافِظُونَ", english: "It is certainly We Who have revealed the Reminder, and We will certainly preserve it.", ref: "Al-Hijr 15:9", key: "15:9" },
    { arabic: "إِنَّ اللَّهَ يَأْمُرُ بِالْعَدْلِ وَالْإِحْسَانِ وَإِيتَاءِ ذِي الْقُرْبَىٰ وَيَنْهَىٰ عَنِ الْفَحْشَاءِ وَالْمُنكَرِ وَالْبَغْيِ", english: "Indeed Allah commands justice, grace, and courtesy to close relatives. He forbids indecency, wickedness, and transgression.", ref: "An-Nahl 16:90", key: "16:90" }
  ],
  [
    { arabic: "وَقَضَىٰ رَبُّكَ أَلَّا تَعْبُدُوا إِلَّا إِيَّاهُ وَبِالْوَالِدَيْنِ إِحْسَانًا", english: "Your Lord has decreed that you worship none but Him, and honour your parents.", ref: "Al-Isra 17:23", key: "17:23" },
    { arabic: "وَاخْفِضْ لَهُمَا جَنَاحَ الذُّلِّ مِنَ الرَّحْمَةِ وَقُل رَّبِّ ارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا", english: "Be humble with them out of mercy and say: My Lord! Be merciful to them as they raised me when I was young.", ref: "Al-Isra 17:24", key: "17:24" },
    { arabic: "رَّبُّكُمْ أَعْلَمُ بِمَا فِي نُفُوسِكُمْ ۚ إِن تَكُونُوا صَالِحِينَ فَإِنَّهُ كَانَ لِلْأَوَّابِينَ غَفُورًا", english: "Your Lord knows best what is in your hearts. If you are righteous, He is truly All-Forgiving to those who turn to Him.", ref: "Al-Isra 17:25", key: "17:25" }
  ],
  [
    { arabic: "وَاصْبِرْ نَفْسَكَ مَعَ الَّذِينَ يَدْعُونَ رَبَّهُم بِالْغَدَاةِ وَالْعَشِيِّ يُرِيدُونَ وَجْهَهُ", english: "Keep yourself content with those who call upon their Lord morning and evening seeking His pleasure.", ref: "Al-Kahf 18:28", key: "18:28" },
    { arabic: "إِنَّ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ إِنَّا لَا نُضِيعُ أَجْرَ مَنْ أَحْسَنَ عَمَلًا", english: "As for those who believe and do good — We never deny the reward of those best in deeds.", ref: "Al-Kahf 18:30", key: "18:30" },
    { arabic: "قُل لَّوْ كَانَ الْبَحْرُ مِدَادًا لِّكَلِمَاتِ رَبِّي لَنَفِدَ الْبَحْرُ قَبْلَ أَن تَنفَدَ كَلِمَاتُ رَبِّي", english: "Say: If the ocean were ink for the words of my Lord, it would run dry before His words are exhausted.", ref: "Al-Kahf 18:109", key: "18:109" }
  ],
  [
    { arabic: "رَبِّ اشْرَحْ لِي صَدْرِي ۝ وَيَسِّرْ لِي أَمْرِي ۝ وَاحْلُلْ عُقْدَةً مِّن لِّسَانِي ۝ يَفْقَهُوا قَوْلِي", english: "My Lord! Uplift my heart, ease my task, and remove the impediment from my tongue so people may understand my speech.", ref: "Ta-Ha 20:25-28", key: "20:25" },
    { arabic: "إِنَّ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ سَيَجْعَلُ لَهُمُ الرَّحْمَٰنُ وُدًّا", english: "Surely those who believe and do good — the Most Merciful will give them love.", ref: "Maryam 19:96", key: "19:96" },
    { arabic: "وَذَا النُّونِ إِذ ذَّهَبَ مُغَاضِبًا فَنَادَىٰ فِي الظُّلُمَاتِ أَن لَّا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ", english: "And the man of the whale cried out in the darkness: There is no god except You — glory be to You — I have truly been one of the wrongdoers.", ref: "Al-Anbiya 21:87", key: "21:87" }
  ],
  [
    { arabic: "فَاسْتَجَبْنَا لَهُ وَنَجَّيْنَاهُ مِنَ الْغَمِّ ۚ وَكَذَٰلِكَ نُنجِي الْمُؤْمِنِينَ", english: "So We responded to him and rescued him from anguish. And thus do We save the believers.", ref: "Al-Anbiya 21:88", key: "21:88" },
    { arabic: "قَدْ أَفْلَحَ الْمُؤْمِنُونَ ۝ الَّذِينَ هُمْ فِي صَلَاتِهِمْ خَاشِعُونَ", english: "Certainly the believers have succeeded — those who are humble in their prayers.", ref: "Al-Mu'minun 23:1-2", key: "23:1" },
    { arabic: "وَالَّذِينَ هُمْ عَنِ اللَّغْوِ مُعْرِضُونَ", english: "And those who turn away from idle talk.", ref: "Al-Mu'minun 23:3", key: "23:3" }
  ],
  [
    { arabic: "اللَّهُ نُورُ السَّمَاوَاتِ وَالْأَرْضِ ۚ مَثَلُ نُورِهِ كَمِشْكَاةٍ فِيهَا مِصْبَاحٌ", english: "Allah is the Light of the heavens and earth. His light is like a niche in which there is a lamp.", ref: "An-Nur 24:35", key: "24:35" },
    { arabic: "نُورٌ عَلَىٰ نُورٍ ۗ يَهْدِي اللَّهُ لِنُورِهِ مَن يَشَاءُ", english: "Light upon light. Allah guides to His light whoever He wills.", ref: "An-Nur 24:35", key: "24:35" },
    { arabic: "وَعِبَادُ الرَّحْمَٰنِ الَّذِينَ يَمْشُونَ عَلَى الْأَرْضِ هَوْنًا وَإِذَا خَاطَبَهُمُ الْجَاهِلُونَ قَالُوا سَلَامًا", english: "The servants of the Most Merciful walk the earth humbly, and when the ignorant address them, they say: Peace.", ref: "Al-Furqan 25:63", key: "25:63" }
  ],
  [
    { arabic: "يَوْمَ لَا يَنفَعُ مَالٌ وَلَا بَنُونَ ۝ إِلَّا مَنْ أَتَى اللَّهَ بِقَلْبٍ سَلِيمٍ", english: "The Day when neither wealth nor children will benefit — only those who come to Allah with a pure heart.", ref: "Ash-Shu'ara 26:88-89", key: "26:88" },
    { arabic: "أَمَّن يُجِيبُ الْمُضْطَرَّ إِذَا دَعَاهُ وَيَكْشِفُ السُّوءَ", english: "Who responds to the distressed when they call upon Him and removes their affliction?", ref: "An-Naml 27:62", key: "27:62" },
    { arabic: "إِنَّكَ لَا تَهْدِي مَنْ أَحْبَبْتَ وَلَٰكِنَّ اللَّهَ يَهْدِي مَن يَشَاءُ", english: "You cannot guide whoever you love — rather Allah guides whoever He wills.", ref: "Al-Qasas 28:56", key: "28:56" }
  ],
  [
    { arabic: "وَمِنْ آيَاتِهِ أَنْ خَلَقَ لَكُم مِّنْ أَنفُسِكُمْ أَزْوَاجًا لِّتَسْكُنُوا إِلَيْهَا وَجَعَلَ بَيْنَكُم مَّوَدَّةً وَرَحْمَةً", english: "Among His signs is that He created spouses for you so you may find comfort in them, and He placed love and mercy between you.", ref: "Ar-Rum 30:21", key: "30:21" },
    { arabic: "وَمِنْ آيَاتِهِ خَلْقُ السَّمَاوَاتِ وَالْأَرْضِ وَاخْتِلَافُ أَلْسِنَتِكُمْ وَأَلْوَانِكُمْ ۚ إِنَّ فِي ذَٰلِكَ لَآيَاتٍ لِّلْعَالِمِينَ", english: "Among His signs is the creation of the heavens and earth and the diversity of your languages and colours. In this are signs for those of knowledge.", ref: "Ar-Rum 30:22", key: "30:22" },
    { arabic: "وَلَقَدْ آتَيْنَا لُقْمَانَ الْحِكْمَةَ أَنِ اشْكُرْ لِلَّهِ ۚ وَمَن يَشْكُرْ فَإِنَّمَا يَشْكُرُ لِنَفْسِهِ", english: "We blessed Luqman with wisdom: Be grateful to Allah — whoever is grateful, it is only for their own good.", ref: "Luqman 31:12", key: "31:12" }
  ],
  [
    { arabic: "يَا بُنَيَّ لَا تُشْرِكْ بِاللَّهِ ۖ إِنَّ الشِّرْكَ لَظُلْمٌ عَظِيمٌ", english: "O my dear son! Never associate anything with Allah — associating others with Him is a tremendous wrong.", ref: "Luqman 31:13", key: "31:13" },
    { arabic: "وَوَصَّيْنَا الْإِنسَانَ بِوَالِدَيْهِ حَمَلَتْهُ أُمُّهُ وَهْنًا عَلَىٰ وَهْنٍ وَفِصَالُهُ فِي عَامَيْنِ أَنِ اشْكُرْ لِي وَلِوَالِدَيْكَ", english: "We commanded people to honour their parents. Their mother carried them through hardship upon hardship. So be grateful to Me and your parents.", ref: "Luqman 31:14", key: "31:14" },
    { arabic: "تَتَجَافَىٰ جُنُوبُهُمْ عَنِ الْمَضَاجِعِ يَدْعُونَ رَبَّهُمْ خَوْفًا وَطَمَعًا ۖ وَمِمَّا رَزَقْنَاهُمْ يُنفِقُونَ", english: "They abandon their beds, calling upon their Lord with hope and fear, and donate from what We have provided them.", ref: "As-Sajdah 32:16", key: "32:16" }
  ],
  [
    { arabic: "يس ۝ وَالْقُرْآنِ الْحَكِيمِ ۝ إِنَّكَ لَمِنَ الْمُرْسَلِينَ", english: "Ya-Sin. By the wise Quran! You are truly one of the messengers.", ref: "Ya-Sin 36:1-3", key: "36:1" },
    { arabic: "إِنَّمَا أَمْرُهُ إِذَا أَرَادَ شَيْئًا أَن يَقُولَ لَهُ كُن فَيَكُونُ", english: "His command when He intends a thing is only to say: Be! — and it is.", ref: "Ya-Sin 36:82", key: "36:82" },
    { arabic: "فَسُبْحَانَ الَّذِي بِيَدِهِ مَلَكُوتُ كُلِّ شَيْءٍ وَإِلَيْهِ تُرْجَعُونَ", english: "Glory be to Him in Whose hands is the dominion of all things, and to Him you will all be returned.", ref: "Ya-Sin 36:83", key: "36:83" }
  ],
  [
    { arabic: "قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا عَلَىٰ أَنفُسِهِمْ لَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ ۚ إِنَّ اللَّهَ يَغْفِرُ الذُّنُوبَ جَمِيعًا", english: "Say: O My servants who have wronged themselves — never despair of Allah's mercy. Indeed Allah forgives all sins.", ref: "Az-Zumar 39:53", key: "39:53" },
    { arabic: "وَأَنِيبُوا إِلَىٰ رَبِّكُمْ وَأَسْلِمُوا لَهُ مِن قَبْلِ أَن يَأْتِيَكُمُ الْعَذَابُ", english: "Turn to your Lord and submit to Him before the punishment comes upon you.", ref: "Az-Zumar 39:54", key: "39:54" },
    { arabic: "الَّذِينَ يَحْمِلُونَ الْعَرْشَ وَمَنْ حَوْلَهُ يُسَبِّحُونَ بِحَمْدِ رَبِّهِمْ وَيَسْتَغْفِرُونَ لِلَّذِينَ آمَنُوا", english: "Those who carry the Throne and those around it glorify their Lord with praise and seek forgiveness for the believers.", ref: "Ghafir 40:7", key: "40:7" }
  ],
  [
    { arabic: "إِنَّ الَّذِينَ قَالُوا رَبُّنَا اللَّهُ ثُمَّ اسْتَقَامُوا تَتَنَزَّلُ عَلَيْهِمُ الْمَلَائِكَةُ أَلَّا تَخَافُوا وَلَا تَحْزَنُوا وَأَبْشِرُوا بِالْجَنَّةِ", english: "Those who say: Our Lord is Allah, then remain steadfast — the angels descend on them: Do not fear or grieve, but rejoice in Paradise.", ref: "Fussilat 41:30", key: "41:30" },
    { arabic: "هُوَ الَّذِي يَقْبَلُ التَّوْبَةَ عَنْ عِبَادِهِ وَيَعْفُو عَنِ السَّيِّئَاتِ وَيَعْلَمُ مَا تَفْعَلُونَ", english: "He is the One Who accepts repentance from His servants, pardons sins, and knows all that you do.", ref: "Ash-Shura 42:25", key: "42:25" },
    { arabic: "وَيَسْتَجِيبُ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ وَيَزِيدُهُم مِّن فَضْلِهِ", english: "He responds to those who believe and do good, and increases them from His bounty.", ref: "Ash-Shura 42:26", key: "42:26" }
  ],
  [
    { arabic: "وَمَا خَلَقْنَا السَّمَاوَاتِ وَالْأَرْضَ وَمَا بَيْنَهُمَا إِلَّا بِالْحَقِّ وَأَجَلٍ مُّسَمًّى", english: "We did not create the heavens, earth and everything between them except for a purpose and a fixed term.", ref: "Al-Ahqaf 46:3", key: "46:3" },
    { arabic: "إِنَّمَا الْمُؤْمِنُونَ إِخْوَةٌ فَأَصْلِحُوا بَيْنَ أَخَوَيْكُمْ ۚ وَاتَّقُوا اللَّهَ لَعَلَّكُمْ تُرْحَمُونَ", english: "The believers are but one brotherhood, so make peace between your brothers and be mindful of Allah so you may be shown mercy.", ref: "Al-Hujurat 49:10", key: "49:10" },

    { arabic: "فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ", english: "So which of your Lord's favours would you both deny?", ref: "Ar-Rahman 55:13", key: "55:13" },

  ],
  [
    { arabic: "إِنَّهُ لَقُرْآنٌ كَرِيمٌ ۝ فِي كِتَابٍ مَّكْنُونٍ ۝ لَّا يَمَسُّهُ إِلَّا الْمُطَهَّرُونَ ۝ تَنزِيلٌ مِّن رَّبِّ الْعَالَمِينَ", english: "This is truly a noble Quran — in a well-preserved Record — touched only by the purified — a revelation from the Lord of all worlds.", ref: "Al-Waqi'ah 56:77-80", key: "56:77" },
    { arabic: "سَبَّحَ لِلَّهِ مَا فِي السَّمَاوَاتِ وَالْأَرْضِ ۖ وَهُوَ الْعَزِيزُ الْحَكِيمُ", english: "Whatever is in the heavens and earth glorifies Allah — He is the Almighty, All-Wise.", ref: "Al-Hadid 57:1", key: "57:1" },
    { arabic: "هُوَ الْأَوَّلُ وَالْآخِرُ وَالظَّاهِرُ وَالْبَاطِنُ ۖ وَهُوَ بِكُلِّ شَيْءٍ عَلِيمٌ", english: "He is the First and the Last, the Most High and Most Near, and He has full knowledge of everything.", ref: "Al-Hadid 57:3", key: "57:3" }
  ],
  [
    { arabic: "هُوَ اللَّهُ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ ۖ عَالِمُ الْغَيْبِ وَالشَّهَادَةِ ۖ هُوَ الرَّحْمَٰنُ الرَّحِيمُ", english: "He is Allah — there is no god except Him, Knower of the seen and unseen. He is the Most Gracious, Most Merciful.", ref: "Al-Hashr 59:22", key: "59:22" },
    { arabic: "هُوَ اللَّهُ الَّذِي لَا إِلَٰهَ إِلَّا هُوَ الْمَلِكُ الْقُدُّوسُ السَّلَامُ الْمُؤْمِنُ الْمُهَيْمِنُ الْعَزِيزُ الْجَبَّارُ الْمُتَكَبِّرُ", english: "He is Allah: the King, the Most Holy, the All-Perfect, the Source of Serenity, the Watcher, the Almighty, the Supreme in Might, the Majestic.", ref: "Al-Hashr 59:23", key: "59:23" },
    { arabic: "هُوَ اللَّهُ الْخَالِقُ الْبَارِئُ الْمُصَوِّرُ ۖ لَهُ الْأَسْمَاءُ الْحُسْنَىٰ ۚ يُسَبِّحُ لَهُ مَا فِي السَّمَاوَاتِ وَالْأَرْضِ", english: "He is Allah: the Creator, the Originator, the Fashioner. He has the most beautiful names. All in the heavens and earth glorify Him.", ref: "Al-Hashr 59:24", key: "59:24" }
  ],
  [
    { arabic: "وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا ۝ وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ", english: "Whoever is mindful of Allah, He will make a way out for them — and provide for them from sources they could never imagine.", ref: "At-Talaq 65:2-3", key: "65:2" },
    { arabic: "وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ ۚ إِنَّ اللَّهَ بَالِغُ أَمْرِهِ ۚ قَدْ جَعَلَ اللَّهُ لِكُلِّ شَيْءٍ قَدْرًا", english: "Whoever puts their trust in Allah — He alone is sufficient. Allah will surely accomplish His purpose. Allah has set a decreed measure for everything.", ref: "At-Talaq 65:3", key: "65:3" },
    { arabic: "تَبَارَكَ الَّذِي بِيَدِهِ الْمُلْكُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ", english: "Blessed is He in Whose hands is all authority, and He is Most Capable of everything.", ref: "Al-Mulk 67:1", key: "67:1" }
  ],
  [
    { arabic: "الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا ۚ وَهُوَ الْعَزِيزُ الْغَفُورُ", english: "Who created death and life to test which of you is best in deeds. He is the Almighty, All-Forgiving.", ref: "Al-Mulk 67:2", key: "67:2" },
    { arabic: "الَّذِي خَلَقَ سَبْعَ سَمَاوَاتٍ طِبَاقًا ۖ مَّا تَرَىٰ فِي خَلْقِ الرَّحْمَٰنِ مِن تَفَاوُتٍ", english: "Who created seven heavens, one above another. You will not see any imperfection in the creation of the Most Merciful.", ref: "Al-Mulk 67:3", key: "67:3" },
    { arabic: "وَلَقَدْ زَيَّنَّا السَّمَاءَ الدُّنْيَا بِمَصَابِيحَ وَجَعَلْنَاهَا رُجُومًا لِّلشَّيَاطِينِ", english: "And We have certainly beautified the nearest heaven with stars and made them as missiles against the devils.", ref: "Al-Mulk 67:5", key: "67:5" }
  ]
];

let provider, signer, contract, userAddress;
let currentSetIndex = Math.floor(Math.random() * VERSE_SETS.length);

const $ = id => document.getElementById(id);
const setStatus = (msg, cls = '') => { $('statusMsg').textContent = msg; $('statusMsg').className = cls; };
const shortAddr = addr => addr.slice(0,6) + '…' + addr.slice(-4);

function renderVerses(setIndex) {
  const set = VERSE_SETS[setIndex % VERSE_SETS.length];
  const frame = $('verseFrame');
  frame.innerHTML = '';

  // Audio player bar at top
  const audioBar = document.createElement('div');
  audioBar.className = 'audio-bar';
  audioBar.id = 'audioBar';
  audioBar.innerHTML = `
    <button class="btn-audio" id="btnAudio" onclick="playRecitation()">
      <span id="audioIcon">▶</span> &nbsp; استمع — Listen
    </button>
    <div class="audio-status" id="audioStatus">Al-Afasy Recitation</div>
  `;
  frame.appendChild(audioBar);

  set.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'verse-item';
    item.innerHTML = `
      <div class="verse-number">— آية ${i + 1} من ٣ —</div>
      <div class="verse-arabic">${v.arabic}</div>
      <div class="verse-english">${v.english}</div>
      <div class="verse-ref">${v.ref}</div>
    `;
    frame.appendChild(item);
  });

  // Store current set for audio
  window._currentVerseSet = set;
  window._audioIndex = 0;
  if (window._audio) { window._audio.pause(); window._audio = null; }
  $('audioIcon') && ($('audioIcon').textContent = '▶');
}

function playRecitation() {
  const set = window._currentVerseSet;
  if (!set) return;

  if (window._audio && !window._audio.paused) {
    window._audio.pause();
    $('audioIcon').textContent = '▶';
    $('audioStatus').textContent = 'Paused';
    return;
  }

  // Use everyayah.com with Mishary Al-Afasy (reciter 05)
  // URL format: https://everyayah.com/data/Alafasy_128kbps/SURAH_AYAH.mp3
  // key format: "surah:ayah"
  const verse = set[window._audioIndex || 0];
  const [surah, ayah] = verse.key.split(':');
  const surahPadded = surah.padStart(3, '0');
  const ayahPadded = ayah.padStart(3, '0');
  const url = `https://everyayah.com/data/Alafasy_128kbps/${surahPadded}${ayahPadded}.mp3`;

  $('audioStatus').textContent = 'Loading…';
  $('audioIcon').textContent = '⏸';

  window._audio = new Audio(url);
  window._audio.play().then(() => {
    $('audioStatus').textContent = `Playing: ${verse.ref}`;
  }).catch(() => {
    $('audioStatus').textContent = 'Could not load audio. Try again.';
    $('audioIcon').textContent = '▶';
  });

  window._audio.onended = () => {
    window._audioIndex = (window._audioIndex || 0) + 1;
    if (window._audioIndex < set.length) {
      playRecitation();
    } else {
      window._audioIndex = 0;
      $('audioIcon').textContent = '▶';
      $('audioStatus').textContent = 'Recitation complete ✓';
    }
  };
}

async function refreshStats() {
  try {
    const [total, mine, fee] = await contract.getStats(userAddress);
    $('globalReads').textContent = total.toString();
    $('myReads').textContent = mine.toString();
    const feeEth = ethers.formatEther(fee);
    $('readFee').textContent = feeEth === '0.0' ? 'Free' : feeEth + ' ETH';
    $('statsRow').style.display = 'flex';
  } catch(_) {}
}

// Show random 3 verses immediately on page load
window.addEventListener('DOMContentLoaded', () => renderVerses(currentSetIndex));

async function connectWallet() {
  if (!window.ethereum) { setStatus('No wallet detected. Install MetaMask or Coinbase Wallet.', 'error'); return; }
  try {
    setStatus('Connecting…');
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts", []);

    const network = await provider.getNetwork();
    if (Number(network.chainId) !== BASE_CHAIN_ID) {
      setStatus('Switching to Base network…');
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BASE_CHAIN_HEX }] });
      } catch (e) {
        if (e.code === 4902) {
          await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [{
            chainId: BASE_CHAIN_HEX, chainName: 'Base',
            nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
            rpcUrls: ['https://mainnet.base.org'], blockExplorerUrls: ['https://basescan.org']
          }]});
        } else throw e;
      }
      provider = new ethers.BrowserProvider(window.ethereum);
    }

    signer = await provider.getSigner();
    userAddress = await signer.getAddress();

    $('walletDot').classList.add('connected');
    $('walletAddr').textContent = shortAddr(userAddress);
    $('networkBadge').style.display = 'inline-flex';
    $('btnConnect').style.display = 'none';
    $('btnRead').disabled = false;

    contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    await refreshStats();
    setStatus('Wallet connected ✓', 'success');
  } catch (err) {
    setStatus(err.message || 'Connection failed', 'error');
  }
}

async function requestVerse() {
  if (!contract) { setStatus('Please connect your wallet first.', 'error'); return; }

  $('btnRead').disabled = true;
  $('loader').style.display = 'block';
  $('txInfo').style.display = 'none';
  setStatus('Sending transaction to Base…');

  try {
    const fee = await contract.readFee();
    const tx  = await contract.requestVerse({ value: fee });
    setStatus('Transaction sent. Waiting for confirmation…');
    const receipt = await tx.wait();

    let verseIndex = currentSetIndex;
    for (const log of receipt.logs) {
      try {
        const parsed = contract.interface.parseLog(log);
        if (parsed?.name === 'VerseRequested') { verseIndex = Number(parsed.args.verseIndex); break; }
      } catch(_) {}
    }

    currentSetIndex = verseIndex % VERSE_SETS.length;
    renderVerses(currentSetIndex);

    $('txLink').href        = BASESCAN_URL + receipt.hash;
    $('txLink').textContent = receipt.hash.slice(0,20) + '…';
    $('txInfo').style.display = 'block';

    setStatus('آيات مباركة — Blessed verses received ✓', 'success');
    await refreshStats();

  } catch (err) {
    if (err.code === 4001 || err.info?.error?.code === 4001) {
      // Cancelled by user — still rotate to next set
      currentSetIndex = (currentSetIndex + 1) % VERSE_SETS.length;
      renderVerses(currentSetIndex);
      setStatus('Transaction cancelled — showing next verses.', '');
    } else {
      setStatus(err.reason || err.message || 'Transaction failed', 'error');
    }
  } finally {
    $('loader').style.display = 'none';
    $('btnRead').disabled = false;
  }
}
</script>
