[{arabic:"يَا أَيُّهَا الَّذِينَ آمَنُوا كُونُوا قَوَّامِينَ لِلَّهِ شُهَدَاءَ بِالْقِسْطِ ۖ وَلَا يَجْرِمَنَّكُمْ شَنَآنُ قَوْمٍ عَلَىٰ أَلَّا تَعْدِلُوا ۚ اعْدِلُوا هُوَ أَقْرَبُ لِلتَّقْوَىٰ ۖ وَاتَّقُوا اللَّهَ ۚ إِنَّ اللَّهَ خَبِيرٌ بِمَا تَعْمَلُونَ",english:"O believers! Stand firmly for Allah as witnesses for justice. Do not let the hatred of a people cause you to be unjust. Be just — that is closer to righteousness. And be mindful of Allah. Surely Allah is All-Aware of what you do.",ref:"Al-Ma'idah 5:8",key:"5:8"},{arabic:"وَعَدَ اللَّهُ الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ ۙ لَهُم مَّغْفِرَةٌ وَأَجْرٌ عَظِيمٌ",english:"Allah has promised those who believe and do good — forgiveness and a great reward.",ref:"Al-Ma'idah 5:9",key:"5:9"},{arabic:"وَالَّذِينَ كَفَرُوا وَكَذَّبُوا بِآيَاتِنَا أُولَٰئِكَ أَصْحَابُ الْجَحِيمِ",english:"And those who disbelieve and deny Our signs — they are the residents of the Hellfire.",ref:"Al-Ma'idah 5:10",key:"5:10"}],
/* 84 Al-Kahf 18:1-3 */
[{arabic:"الْحَمْدُ لِلَّهِ الَّذِي أَنزَلَ عَلَىٰ عَبْدِهِ الْكِتَابَ وَلَمْ يَجْعَل لَّهُ عِوَجًا",english:"All praise is for Allah Who has revealed the Book to His servant and has not made in it any crookedness.",ref:"Al-Kahf 18:1",key:"18:1"},{arabic:"قَيِّمًا لِّيُنذِرَ بَأْسًا شَدِيدًا مِّن لَّدُنْهُ وَيُبَشِّرَ الْمُؤْمِنِينَ الَّذِينَ يَعْمَلُونَ الصَّالِحَاتِ أَنَّ لَهُمْ أَجْرًا حَسَنًا",english:"Upright, to warn of a severe punishment from Him and to give good news to the believers who do good that they will have an excellent reward —",ref:"Al-Kahf 18:2",key:"18:2"},{arabic:"مَّاكِثِينَ فِيهِ أَبَدًا",english:"In which they will remain forever.",ref:"Al-Kahf 18:3",key:"18:3"}],
/* 85 Az-Zumar 39:1-3 */
[{arabic:"تَنزِيلُ الْكِتَابِ مِنَ اللَّهِ الْعَزِيزِ الْحَكِيمِ",english:"The revelation of this Book is from Allah — the Almighty, All-Wise.",ref:"Az-Zumar 39:1",key:"39:1"},{arabic:"إِنَّا أَنزَلْنَا إِلَيْكَ الْكِتَابَ بِالْحَقِّ فَاعْبُدِ اللَّهَ مُخْلِصًا لَّهُ الدِّينَ",english:"Indeed We have sent down the Book to you with the truth, so worship Allah, devoting your faith sincerely to Him.",ref:"Az-Zumar 39:2",key:"39:2"},{arabic:"أَلَا لِلَّهِ الدِّينُ الْخَالِصُ ۚ وَالَّذِينَ اتَّخَذُوا مِن دُونِهِ أَوْلِيَاءَ مَا نَعْبُدُهُمْ إِلَّا لِيُقَرِّبُونَا إِلَى اللَّهِ زُلْفَىٰ إِنَّ اللَّهَ يَحْكُمُ بَيْنَهُمْ فِي مَا هُمْ فِيهِ يَخْتَلِفُونَ ۗ إِنَّ اللَّهَ لَا يَهْدِي مَنْ هُوَ كَاذِبٌ كَفَّارٌ",english:"Surely sincere devotion is due to Allah alone. As for those who take other guardians besides Him, saying: We worship them only so they may bring us closer to Allah — Allah will judge between them regarding what they disagree about. Surely Allah does not guide those who are liars and persistent disbelievers.",ref:"Az-Zumar 39:3",key:"39:3"}],
/* 86 Al-Mu'min 40:7-9 */
[{arabic:"الَّذِينَ يَحْمِلُونَ الْعَرْشَ وَمَنْ حَوْلَهُ يُسَبِّحُونَ بِحَمْدِ رَبِّهِمْ وَيُؤْمِنُونَ بِهِ وَيَسْتَغْفِرُونَ لِلَّذِينَ آمَنُوا رَبَّنَا وَسِعْتَ كُلَّ شَيْءٍ رَّحْمَةً وَعِلْمًا فَاغْفِرْ لِلَّذِينَ تَابُوا وَاتَّبَعُوا سَبِيلَكَ وَقِهِمْ عَذَابَ الْجَحِيمِ",english:"Those who carry the Throne and those around it glorify their Lord's praises, believe in Him, and seek forgiveness for the believers, saying: Our Lord! You encompass everything in mercy and knowledge. So forgive those who repent and follow Your path, and protect them from the punishment of the Hellfire.",ref:"Ghafir 40:7",key:"40:7"},{arabic:"رَبَّنَا وَأَدْخِلْهُمْ جَنَّاتِ عَدْنٍ الَّتِي وَعَدتَّهُمْ وَمَن صَلَحَ مِنْ آبَائِهِمْ وَأَزْوَاجِهِمْ وَذُرِّيَّاتِهِمْ ۚ إِنَّكَ أَنتَ الْعَزِيزُ الْحَكِيمُ",english:"Our Lord! Admit them into the Gardens of Eternity which You have promised them, along with the righteous among their parents, spouses, and descendants. You are truly the Almighty, All-Wise.",ref:"Ghafir 40:8",key:"40:8"},{arabic:"وَقِهِمُ السَّيِّئَاتِ ۚ وَمَن تَقِ السَّيِّئَاتِ يَوْمَئِذٍ فَقَدْ رَحِمْتَهُ ۚ وَذَٰلِكَ هُوَ الْفَوْزُ الْعَظِيمُ",english:"And protect them from the evil of their deeds. For whoever You protect from the evil of their deeds on that Day — You will have truly shown them mercy. And that is the supreme triumph.",ref:"Ghafir 40:9",key:"40:9"}],
/* 87 Al-Fath 48:1-3 */
[{arabic:"إِنَّا فَتَحْنَا لَكَ فَتْحًا مُّبِينًا",english:"Indeed We have granted you a clear triumph —",ref:"Al-Fath 48:1",key:"48:1"},{arabic:"لِّيَغْفِرَ لَكَ اللَّهُ مَا تَقَدَّمَ مِن ذَنبِكَ وَمَا تَأَخَّرَ وَيُتِمَّ نِعْمَتَهُ عَلَيْكَ وَيَهْدِيَكَ صِرَاطًا مُّسْتَقِيمًا",english:"So that Allah may forgive you for your past and future shortcomings, complete His favour upon you, and guide you to the straight path,",ref:"Al-Fath 48:2",key:"48:2"},{arabic:"وَيَنصُرَكَ اللَّهُ نَصْرًا عَزِيزًا",english:"And so that Allah may give you a mighty victory.",ref:"Al-Fath 48:3",key:"48:3"}],
/* 88 Al-Hujurat 49:1-3 */
[{arabic:"يَا أَيُّهَا الَّذِينَ آمَنُوا لَا تُقَدِّمُوا بَيْنَ يَدَيِ اللَّهِ وَرَسُولِهِ ۖ وَاتَّقُوا اللَّهَ ۚ إِنَّ اللَّهَ سَمِيعٌ عَلِيمٌ",english:"O believers! Do not put yourselves ahead of Allah and His Messenger. And be mindful of Allah — surely Allah is All-Hearing, All-Knowing.",ref:"Al-Hujurat 49:1",key:"49:1"},{arabic:"يَا أَيُّهَا الَّذِينَ آمَنُوا لَا تَرْفَعُوا أَصْوَاتَكُمْ فَوْقَ صَوْتِ النَّبِيِّ وَلَا تَجْهَرُوا لَهُ بِالْقَوْلِ كَجَهْرِ بَعْضِكُمْ لِبَعْضٍ أَن تَحْبَطَ أَعْمَالُكُمْ وَأَنتُمْ لَا تَشْعُرُونَ",english:"O believers! Do not raise your voices above the voice of the Prophet, and do not speak loudly to him as you do to one another, or your deeds may become void without you knowing.",ref:"Al-Hujurat 49:2",key:"49:2"},{arabic:"إِنَّ الَّذِينَ يَغُضُّونَ أَصْوَاتَهُمْ عِندَ رَسُولِ اللَّهِ أُولَٰئِكَ الَّذِينَ امْتَحَنَ اللَّهُ قُلُوبَهُمْ لِلتَّقْوَىٰ ۚ لَهُم مَّغْفِرَةٌ وَأَجْرٌ عَظِيمٌ",english:"Indeed those who lower their voices in the presence of Allah's Messenger — they are the ones whose hearts Allah has refined for righteousness. They will have forgiveness and a great reward.",ref:"Al-Hujurat 49:3",key:"49:3"}],
/* 89 Al-Muzzammil 73:8-10 */
[{arabic:"وَاذْكُرِ اسْمَ رَبِّكَ وَتَبَتَّلْ إِلَيْهِ تَبْتِيلًا",english:"Remember the name of your Lord and devote yourself to Him wholeheartedly.",ref:"Al-Muzzammil 73:8",key:"73:8"},{arabic:"رَّبُّ الْمَشْرِقِ وَالْمَغْرِبِ لَا إِلَٰهَ إِلَّا هُوَ فَاتَّخِذْهُ وَكِيلًا",english:"He is the Lord of the east and west — there is no god except Him — so take Him alone as your Guardian.",ref:"Al-Muzzammil 73:9",key:"73:9"},{arabic:"وَاصْبِرْ عَلَىٰ مَا يَقُولُونَ وَاهْجُرْهُمْ هَجْرًا جَمِيلًا",english:"And endure patiently what they say, and depart from them gracefully.",ref:"Al-Muzzammil 73:10",key:"73:10"}],
/* 90 Al-Muddaththir 74:1-3 */
[{arabic:"يَا أَيُّهَا الْمُدَّثِّرُ",english:"O you wrapped in your cloak!",ref:"Al-Muddaththir 74:1",key:"74:1"},{arabic:"قُمْ فَأَنذِرْ",english:"Arise and warn!",ref:"Al-Muddaththir 74:2",key:"74:2"},{arabic:"وَرَبَّكَ فَكَبِّرْ",english:"And glorify your Lord.",ref:"Al-Muddaththir 74:3",key:"74:3"}]
];

let provider, signer, contract, userAddress;
let currentSetIndex = Math.floor(Math.random() * VERSE_SETS.length);

const $ = id => document.getElementById(id);
const setStatus = (msg, cls = '') => { $('statusMsg').textContent = msg; $('statusMsg').className = cls; };
const shortAddr = addr => addr.slice(0,6) + '…' + addr.slice(-4);

// ── Audio state (single play-all for the 3 verses) ─────────────────────────
let _audio = null, _audioIdx = 0, _currentSet = null, _isPlaying = false;

function stopAudio() {
  if (_audio) { _audio.pause(); _audio.onended = null; _audio = null; }
  _isPlaying = false; _audioIdx = 0;
}

function updateDots(activeIdx) {
  document.querySelectorAll('.audio-dot').forEach((d, i) => {
    d.classList.remove('active','done');
    if (i < activeIdx) d.classList.add('done');
    else if (i === activeIdx) d.classList.add('active');
  });
}

function playIdx(i) {
  if (!_currentSet || i >= _currentSet.length) {
    const ic=$('audioIcon'), st=$('audioStatus');
    if(ic) ic.textContent='▶'; if(st) st.textContent='Recitation complete ✓';
    updateDots(_currentSet ? _currentSet.length : 0);
    _isPlaying=false; _audioIdx=0; return;
  }
  _audioIdx=i; updateDots(i);
  const v=_currentSet[i], [s,a]=v.key.split(':');
  const url=`https://everyayah.com/data/Alafasy_128kbps/${s.padStart(3,'0')}${a.padStart(3,'0')}.mp3`;
  const st=$('audioStatus');
  if(st) st.textContent=`Playing ${i+1}/3 — ${v.ref}`;
  _audio=new Audio(url);
  _audio.play().catch(()=>{
    if(st) st.textContent='Could not load audio. Try again.';
    const ic=$('audioIcon'); if(ic) ic.textContent='▶'; _isPlaying=false;
  });
  _audio.onended=()=>playIdx(i+1);
}

function toggleRecitation() {
  const ic=$('audioIcon'), st=$('audioStatus');
  if (_isPlaying) {
    if(_audio) _audio.pause();
    _isPlaying=false; if(ic) ic.textContent='▶'; if(st) st.textContent='Paused'; return;
  }
  if (_audio && _audio.paused && _audioIdx>0) {
    _audio.play(); _isPlaying=true;
    if(ic) ic.textContent='⏸';
    if(st && _currentSet) st.textContent=`Playing ${_audioIdx+1}/3 — ${_currentSet[_audioIdx].ref}`;
    return;
  }
  _isPlaying=true; if(ic) ic.textContent='⏸'; if(st) st.textContent='Loading…';
  playIdx(0);
}

function renderVerses(setIndex) {
  stopAudio();
  const set = VERSE_SETS[setIndex % VERSE_SETS.length];
  _currentSet = set;
  const frame = $('verseFrame');
  frame.innerHTML = '';

  // ── single audio bar ────────────────────────────────────────────────────
  const bar = document.createElement('div');
  bar.className = 'audio-bar';
  bar.innerHTML = `
    <button class="btn-audio" id="btnAudio" onclick="toggleRecitation()">
      <span id="audioIcon">▶</span>&nbsp; استمع — Listen to all 3
    </button>
    <div class="audio-status" id="audioStatus">Al-Afasy Recitation · 3 consecutive verses</div>
    <div class="audio-dots">
      <div class="audio-dot"></div><div class="audio-dot"></div><div class="audio-dot"></div>
    </div>`;
  frame.appendChild(bar);

  set.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'verse-item';
    item.innerHTML = `
      <div class="verse-number">— آية ${i+1} من ٣ —</div>
      <div class="verse-arabic">${v.arabic}</div>
      <div class="verse-english">${v.english}</div>
      <div class="verse-ref">${v.ref}</div>`;
    frame.appendChild(item);
  });

}

async function requestVerse() {
  if (!contract) { setStatus('Please connect your wallet first.', 'error'); return; }

  $('btnRead').disabled = true;
  $('loader').style.display = 'block';
  $('txInfo').style.display = 'none';
  setStatus('Sending transaction to Base…');

  try {
    const fee = await contract.readFee();
    const tx  = await contract.requestVerse({ value: fee });
    setStatus('Transaction sent. Waiting for confirmation…');
    const receipt = await tx.wait();

    let verseIndex = currentSetIndex;
    for (const log of receipt.logs) {
      try {
        const parsed = contract.interface.parseLog(log);
        if (parsed?.name === 'VerseRequested') { verseIndex = Number(parsed.args.verseIndex); break; }
      } catch(_) {}
    }

    currentSetIndex = verseIndex % VERSE_SETS.length;
    renderVerses(currentSetIndex);

    $('txLink').href        = BASESCAN_URL + receipt.hash;
    $('txLink').textContent = receipt.hash.slice(0,20) + '…';
    $('txInfo').style.display = 'block';

    setStatus('آيات مباركة — Blessed verses received ✓', 'success');
    await refreshStats();

  } catch (err) {
    if (err.code === 4001 || err.info?.error?.code === 4001) {
      // Cancelled by user — still rotate to next set
      currentSetIndex = (currentSetIndex + 1) % VERSE_SETS.length;
      renderVerses(currentSetIndex);
      setStatus('Transaction cancelled — showing next verses.', '');
    } else {
      setStatus(err.reason || err.message || 'Transaction failed', 'error');
    }
  } finally {
    $('loader').style.display = 'none';
    $('btnRead').disabled = false;
  }
}
</script>
